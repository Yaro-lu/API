client:
  id: ""
  name: "AIWorker"
  version: "0.1.0"

server:
  base_url: "https://your-server.com"
  websocket_url: "wss://your-server.com/ws/worker"
  token: ""

runtime:
  python_path: "./runtime/python_embeded/python.exe"
  comfyui_path: "./runtime/ComfyUI"
  ffmpeg_path: "./runtime/ffmpeg/bin/ffmpeg.exe"
  comfyui_port: 8188
  local_api_port: 8090

paths:
  models: "./models"
  inputs: "./inputs"
  outputs: "./outputs"
  cache: "./cache"
  logs: "./logs"

gpu:
  min_driver_version: "572.61"
  min_compute_family: "RTX"
  min_vram_gb: 8
  recommended_vram_gb: 12

task:
  max_concurrent: 1
  heartbeat_interval_sec: 15
  poll_interval_sec: 5
